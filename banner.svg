<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="roundedBanner2"><rect width="1200" height="420" rx="16" ry="16"/></clipPath>

    <pattern id="hatchDiag" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1E2A35" stroke-width="1.4"/>
    </pattern>
    <pattern id="hatchDiagNeg" width="8" height="8" patternTransform="rotate(-45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#1E2A35" stroke-width="1.4"/>
    </pattern>
    <pattern id="hatchVert" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#1E2A35" stroke-width="1.4"/>
    </pattern>
    <pattern id="hatchHoriz" width="6" height="6" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="6" y2="0" stroke="#1E2A35" stroke-width="1.4"/>
    </pattern>
    <pattern id="hatchDots" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1E2A35"/>
    </pattern>
  </defs>

  <g clip-path="url(#roundedBanner2)">
    <rect width="1200" height="420" fill="#0B0F14"/>

    <!-- header strip -->
    <rect x="0" y="0" width="1200" height="44" fill="#10161D"/>
    <line x1="0" y1="44" x2="1200" y2="44" stroke="#1E2A35" stroke-width="1"/>
    <text x="32" y="27" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="13" letter-spacing="1" fill="#64707C">DWG — CORTE TRANSVERSAL / FULL STACK</text>
    <circle cx="1150" cy="22" r="16" fill="none" stroke="#6FE3E8" stroke-width="1.2"/>
    <text x="1150" y="27" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" font-weight="700" fill="#6FE3E8">CM</text>

    <!-- dimension line -->
    <line x1="70" y1="64" x2="70" y2="340" stroke="#3A4451" stroke-width="1"/>
    <line x1="60" y1="64" x2="80" y2="64" stroke="#3A4451" stroke-width="1"/>
    <line x1="60" y1="340" x2="80" y2="340" stroke="#3A4451" stroke-width="1"/>
    <text x="52" y="202" font-family="ui-monospace, monospace" font-size="12" letter-spacing="2" fill="#64707C" transform="rotate(-90 52 202)">FULL STACK</text>

    <!-- LAYER 1: CLIENT -->
    <g>
      <rect x="110" y="64" width="650" height="56" fill="#121820"/>
      <rect x="110" y="64" width="650" height="56" fill="url(#hatchDiag)" opacity="0.55"/>
      <rect x="110" y="64" width="650" height="56" fill="none" stroke="#1E2A35" stroke-width="1"/>
      <rect x="110" y="64" width="4" height="56" fill="#6FE3E8"/>
      <text x="132" y="97" font-family="ui-monospace, monospace" font-size="15" font-weight="700" letter-spacing="1" fill="#E7ECF2">CLIENT</text>
      <line x1="760" y1="92" x2="820" y2="92" stroke="#3A4451" stroke-width="1"/>
      <circle cx="760" cy="92" r="3" fill="#6FE3E8"/>
      <text x="830" y="88" font-family="ui-monospace, monospace" font-size="11" fill="#64707C">» capa de interfaz</text>
      <text x="830" y="104" font-family="ui-monospace, monospace" font-size="13" fill="#E7ECF2">React · Tailwind · JavaScript</text>
    </g>

    <!-- LAYER 2: GATEWAY -->
    <g>
      <rect x="110" y="120" width="650" height="52" fill="#121820"/>
      <rect x="110" y="120" width="650" height="52" fill="url(#hatchVert)" opacity="0.55"/>
      <rect x="110" y="120" width="650" height="52" fill="none" stroke="#1E2A35" stroke-width="1"/>
      <rect x="110" y="120" width="4" height="52" fill="#6FE3E8"/>
      <text x="132" y="151" font-family="ui-monospace, monospace" font-size="15" font-weight="700" letter-spacing="1" fill="#E7ECF2">GATEWAY</text>
      <line x1="760" y1="146" x2="820" y2="146" stroke="#3A4451" stroke-width="1"/>
      <circle cx="760" cy="146" r="3" fill="#6FE3E8"/>
      <text x="830" y="142" font-family="ui-monospace, monospace" font-size="11" fill="#64707C">» capa de servicio</text>
      <text x="830" y="158" font-family="ui-monospace, monospace" font-size="13" fill="#E7ECF2">Node.js · Express</text>
    </g>

    <!-- LAYER 3: SERVICES -->
    <g>
      <rect x="110" y="172" width="650" height="52" fill="#121820"/>
      <rect x="110" y="172" width="650" height="52" fill="url(#hatchDiagNeg)" opacity="0.55"/>
      <rect x="110" y="172" width="650" height="52" fill="none" stroke="#1E2A35" stroke-width="1"/>
      <rect x="110" y="172" width="4" height="52" fill="#6FE3E8"/>
      <text x="132" y="203" font-family="ui-monospace, monospace" font-size="15" font-weight="700" letter-spacing="1" fill="#E7ECF2">SERVICES</text>
      <line x1="760" y1="198" x2="820" y2="198" stroke="#3A4451" stroke-width="1"/>
      <circle cx="760" cy="198" r="3" fill="#6FE3E8"/>
      <text x="830" y="194" font-family="ui-monospace, monospace" font-size="11" fill="#64707C">» microservicios</text>
      <text x="830" y="210" font-family="ui-monospace, monospace" font-size="13" fill="#E7ECF2">Spring · Java</text>
    </g>

    <!-- LAYER 4: AUTH -->
    <g>
      <rect x="110" y="224" width="650" height="48" fill="#121820"/>
      <rect x="110" y="224" width="650" height="48" fill="url(#hatchDots)" opacity="0.7"/>
      <rect x="110" y="224" width="650" height="48" fill="none" stroke="#1E2A35" stroke-width="1"/>
      <rect x="110" y="224" width="4" height="48" fill="#6FE3E8"/>
      <text x="132" y="253" font-family="ui-monospace, monospace" font-size="15" font-weight="700" letter-spacing="1" fill="#E7ECF2">AUTH</text>
      <line x1="760" y1="248" x2="820" y2="248" stroke="#3A4451" stroke-width="1"/>
      <circle cx="760" cy="248" r="3" fill="#6FE3E8"/>
      <text x="830" y="244" font-family="ui-monospace, monospace" font-size="11" fill="#64707C">» seguridad</text>
      <text x="830" y="260" font-family="ui-monospace, monospace" font-size="13" fill="#E7ECF2">JWT · Roles y permisos</text>
    </g>

    <!-- LAYER 5: DATA -->
    <g>
      <rect x="110" y="272" width="650" height="68" fill="#121820"/>
      <rect x="110" y="272" width="650" height="68" fill="url(#hatchHoriz)" opacity="0.55"/>
      <rect x="110" y="272" width="650" height="68" fill="none" stroke="#1E2A35" stroke-width="1"/>
      <rect x="110" y="272" width="4" height="68" fill="#6FE3E8"/>
      <text x="132" y="311" font-family="ui-monospace, monospace" font-size="15" font-weight="700" letter-spacing="1" fill="#E7ECF2">DATA</text>
      <line x1="760" y1="306" x2="820" y2="306" stroke="#3A4451" stroke-width="1"/>
      <circle cx="760" cy="306" r="3" fill="#6FE3E8"/>
      <text x="830" y="298" font-family="ui-monospace, monospace" font-size="11" fill="#64707C">» persistencia</text>
      <text x="830" y="314" font-family="ui-monospace, monospace" font-size="13" fill="#E7ECF2">PostgreSQL · MongoDB</text>
    </g>

    <!-- FOUNDATION: INFRA -->
    <rect x="110" y="344" width="650" height="20" fill="#121820"/>
    <rect x="110" y="344" width="650" height="20" fill="url(#hatchDiag)" opacity="0.8"/>
    <rect x="110" y="344" width="650" height="20" fill="none" stroke="#1E2A35" stroke-width="1"/>
    <text x="435" y="358" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" letter-spacing="2" fill="#64707C">FUNDACIÓN — DOCKER / INFRA</text>

    <!-- stamp -->
    <g transform="rotate(-12 800 388)">
      <circle cx="800" cy="388" r="26" fill="none" stroke="#F2B84B" stroke-width="1.4" stroke-dasharray="3 3"/>
      <text x="800" y="392" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" font-weight="700" letter-spacing="1" fill="#F2B84B">ACTIVO</text>
    </g>

    <!-- title block -->
    <g font-family="ui-monospace, monospace">
      <rect x="850" y="344" width="310" height="56" fill="none" stroke="#3A4451" stroke-width="1"/>
      <line x1="927.5" y1="344" x2="927.5" y2="400" stroke="#3A4451" stroke-width="1"/>
      <line x1="1005" y1="344" x2="1005" y2="400" stroke="#3A4451" stroke-width="1"/>
      <line x1="1082.5" y1="344" x2="1082.5" y2="400" stroke="#3A4451" stroke-width="1"/>
      <line x1="850" y1="368" x2="1160" y2="368" stroke="#3A4451" stroke-width="1"/>

      <text x="860" y="360" font-size="8" letter-spacing="1" fill="#64707C">DIBUJADO POR</text>
      <text x="860" y="384" font-size="11" font-weight="700" fill="#E7ECF2">C. MARTINEZ</text>

      <text x="937" y="360" font-size="8" letter-spacing="1" fill="#64707C">PLANO N°</text>
      <text x="937" y="384" font-size="11" font-weight="700" fill="#E7ECF2">CM-01</text>

      <text x="1015" y="360" font-size="8" letter-spacing="1" fill="#64707C">ESCALA</text>
      <text x="1015" y="384" font-size="11" font-weight="700" fill="#E7ECF2">1:1</text>

      <text x="1092" y="360" font-size="8" letter-spacing="1" fill="#64707C">HOJA</text>
      <text x="1092" y="384" font-size="11" font-weight="700" fill="#E7ECF2">01/01</text>
    </g>

    <text x="32" y="404" font-family="ui-monospace, monospace" font-size="10" letter-spacing="1" fill="#3A4451">TODAS LAS MEDIDAS EN CAPAS DE STACK — GUATEMALA</text>
  </g>
</svg>
