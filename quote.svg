<svg width="1200" height="110" viewBox="0 0 1200 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="rb2"><rect width="1200" height="110" rx="14"/></clipPath>

    <linearGradient id="bgGrad2" x1="0" y1="0" x2="1200" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#05070C"/>
      <stop offset="0.5" stop-color="#0D1420"/>
      <stop offset="1" stop-color="#05070C"/>
    </linearGradient>

    <radialGradient id="glowQ" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#2E6E9E" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2E6E9E" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="textGradQ" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6FA8D8"/>
      <stop offset="0.5" stop-color="#DCE3EA"/>
      <stop offset="1" stop-color="#D9924E"/>
    </linearGradient>

    <filter id="blurQ" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>

    <pattern id="gridPatQ" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#2A3B4D" stroke-width="0.6" opacity="0.3"/>
    </pattern>

    <!-- typewriter reveal for the quote -->
    <clipPath id="typeClipQ">
      <rect x="60" y="30" width="0" height="60">
        <animate attributeName="width" values="0;1080;1080;1080;0;0" keyTimes="0;0.42;0.85;0.9;0.95;1" dur="9s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <g clip-path="url(#rb2)">
    <rect width="1200" height="110" fill="url(#bgGrad2)"/>
    <rect width="1200" height="110" fill="url(#gridPatQ)"/>
    <circle cx="600" cy="55" r="260" fill="url(#glowQ)" filter="url(#blurQ)"/>

    <g stroke="#33475A" stroke-width="1" opacity="0.7">
      <line x1="60" y1="18" x2="200" y2="18"/>
      <line x1="1000" y1="18" x2="1140" y2="18"/>
      <line x1="60" y1="92" x2="200" y2="92"/>
      <line x1="1000" y1="92" x2="1140" y2="92"/>
    </g>

    <text x="600" y="20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" letter-spacing="3" fill="#4C6478">LOG.QUOTE_0X01</text>

    <!-- quote text: typewriter reveal -->
    <g clip-path="url(#typeClipQ)">
      <text x="600" y="72" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="23" font-weight="700" letter-spacing="0.5" fill="url(#textGradQ)">&#8220;Si te rindes hoy, ¿de qué sirve el esfuerzo de ayer?&#8221;</text>
    </g>

    <!-- travelling / blinking cursor -->
    <rect y="48" width="4" height="30" fill="#D9924E">
      <animate attributeName="x" values="56;56;1136;1136;1136;56" keyTimes="0;0.02;0.42;0.85;0.9;0.92" dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1;0;1;0;1;0;1" dur="0.9s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
