<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1B232C" />
    </pattern>
    <clipPath id="roundedBanner">
      <rect width="1200" height="300" rx="16" ry="16"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundedBanner)">
    <rect width="1200" height="300" fill="#0A0E12"/>
    <rect width="1200" height="300" fill="url(#grid)"/>

    <!-- terminal window chrome -->
    <rect x="0" y="0" width="1200" height="36" fill="#10161D"/>
    <circle cx="26" cy="18" r="6" fill="#8A4B48"/>
    <circle cx="46" cy="18" r="6" fill="#8A7040"/>
    <circle cx="66" cy="18" r="6" fill="#4A8A6C"/>
    <text x="600" y="23" text-anchor="middle" font-family="ui-monospace, 'Cascadia Code', 'SFMono-Regular', Menlo, monospace" font-size="13" fill="#5B6673">~/cristopher-martinez — zsh</text>
    <line x1="0" y1="36" x2="1200" y2="36" stroke="#1B232C" stroke-width="1"/>

    <!-- vertical divider between terminal text and node map -->
    <line x1="740" y1="56" x2="740" y2="300" stroke="#1B232C" stroke-width="1"/>

    <!-- terminal body -->
    <g font-family="ui-monospace, 'Cascadia Code', 'SFMono-Regular', Menlo, monospace">
      <text x="40" y="90" font-size="20" fill="#6B7785">guest@github <tspan fill="#6FE7B7">~$</tspan> whoami</text>
      <text x="40" y="122" font-size="27" font-weight="600" fill="#E7ECF2">cristopher-martinez</text>

      <text x="40" y="168" font-size="20" fill="#6B7785">guest@github <tspan fill="#6FE7B7">~$</tspan> cat rol.txt</text>
      <text x="40" y="200" font-size="22" fill="#E7ECF2">full-stack developer <tspan fill="#6B7785">·</tspan> estudiante</text>
      <text x="40" y="228" font-size="22" fill="#E7ECF2">construyendo microservicios <tspan fill="#F2B84B">🇬🇹</tspan></text>

      <text x="40" y="264" font-size="20" fill="#6B7785">guest@github <tspan fill="#6FE7B7">~$</tspan></text>
      <rect x="173" y="248" width="11" height="20" fill="#E7ECF2">
        <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- architecture node map -->
    <g stroke="#2A3440" stroke-width="1.5" fill="none">
      <line x1="820" y1="150" x2="930" y2="95"/>
      <line x1="820" y1="150" x2="930" y2="205"/>
      <line x1="930" y1="95" x2="1050" y2="95"/>
      <line x1="930" y1="205" x2="1050" y2="205"/>
    </g>
    <g font-family="ui-monospace, 'Cascadia Code', 'SFMono-Regular', Menlo, monospace" font-size="12" fill="#6B7785" text-anchor="middle">
      <circle cx="820" cy="150" r="8" fill="#6FE7B7"/>
      <text x="820" y="178">client</text>

      <circle cx="930" cy="95" r="7" fill="#F2B84B"/>
      <text x="930" y="76">gateway</text>

      <circle cx="930" cy="205" r="7" fill="#8FA6C2"/>
      <text x="930" y="233">auth</text>

      <circle cx="1050" cy="95" r="7" fill="#6FE7B7"/>
      <text x="1050" y="76">api</text>

      <circle cx="1050" cy="205" r="7" fill="#8FA6C2"/>
      <text x="1050" y="233">db</text>
    </g>

    <text x="1160" y="286" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" fill="#3A4451">v1.0 · GT</text>
  </g>
</svg>
