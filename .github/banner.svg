<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="Fira Code, Consolas, monospace">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>

    <clipPath id="c1"><rect x="0" y="0" width="0" height="26"><animate attributeName="width" from="0" to="95" dur="0.4s" begin="0.3s" fill="freeze"/></rect></clipPath>
    <clipPath id="c2"><rect x="0" y="0" width="0" height="26"><animate attributeName="width" from="0" to="520" dur="1.1s" begin="0.9s" fill="freeze"/></rect></clipPath>
    <clipPath id="c3"><rect x="0" y="0" width="0" height="26"><animate attributeName="width" from="0" to="185" dur="0.5s" begin="2.4s" fill="freeze"/></rect></clipPath>
    <clipPath id="c4"><rect x="0" y="0" width="0" height="26"><animate attributeName="width" from="0" to="640" dur="1.6s" begin="3.1s" fill="freeze"/></rect></clipPath>
    <clipPath id="c5"><rect x="0" y="0" width="0" height="26"><animate attributeName="width" from="0" to="210" dur="0.5s" begin="5.1s" fill="freeze"/></rect></clipPath>
    <clipPath id="c6"><rect x="0" y="0" width="0" height="26"><animate attributeName="width" from="0" to="620" dur="1.7s" begin="5.8s" fill="freeze"/></rect></clipPath>
  </defs>

  <rect width="900" height="300" rx="16" fill="url(#bg)"/>

  <rect width="900" height="42" rx="16" fill="#0B141A"/>
  <rect y="26" width="900" height="16" fill="#0B141A"/>
  <circle cx="28" cy="21" r="7" fill="#FF5F56"/>
  <circle cx="50" cy="21" r="7" fill="#FFBD2E"/>
  <circle cx="72" cy="21" r="7" fill="#27C93F"/>
  <text x="450" y="26" text-anchor="middle" fill="#7C8A9A" font-size="13">cristopher@dev — zsh</text>
  <line x1="0" y1="42" x2="900" y2="42" stroke="#2C3542"/>

  <g clip-path="url(#c1)">
    <text x="30" y="80" fill="#5EEAD4" font-size="18">$ whoami</text>
  </g>

  <g clip-path="url(#c2)">
    <text x="30" y="112" fill="#E6EDF3" font-size="18">Cristopher Martinez — Full Stack Developer</text>
  </g>

  <g clip-path="url(#c3)">
    <text x="30" y="150" fill="#5EEAD4" font-size="18">$ cat stack.txt</text>
  </g>

  <g clip-path="url(#c4)">
    <text x="30" y="182" fill="#E6EDF3" font-size="15">React · Node.js · Spring Boot · Docker · PostgreSQL · MongoDB</text>
  </g>

  <g clip-path="url(#c5)">
    <text x="30" y="220" fill="#5EEAD4" font-size="18">$ echo $MOTIVACION</text>
  </g>

  <g clip-path="url(#c6)">
    <text x="30" y="252" fill="#94A3B8" font-size="13" font-style="italic">"Cuanto más te cuesta lograr algo, mayor será la recompensa obtenida"</text>
  </g>

  <rect x="30" y="260" width="9" height="18" fill="#5EEAD4">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.5;0.5;1;1" dur="1s" begin="7.5s" repeatCount="indefinite"/>
  </rect>

</svg>
