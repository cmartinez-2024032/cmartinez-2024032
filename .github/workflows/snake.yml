name: Generar snake de contribuciones

on:
  schedule:
    - cron: "0 5 * * *"   # se ejecuta todos los días a las 5am UTC
  workflow_dispatch: {}    # permite ejecutarlo manualmente también
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generar SVG animado
        uses: Platane/snk@v3
        with:
          github_user_name: cmartinez-2024032
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Subir a la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
